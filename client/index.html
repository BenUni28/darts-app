<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DARTS-APP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="scanlines"></div>

  <header class="app-header">
    <div class="header-left">
      <span class="logo pixel-font">★ DARTS-APP ★</span>
    </div>
    <nav class="header-nav" id="main-nav">
      <a href="#/" class="nav-link" data-route="/">PLAY</a>
      <a href="#/players" class="nav-link" data-route="/players">PLAYERS</a>
      <a href="#/stats" class="nav-link" data-route="/stats">STATS</a>
    </nav>
  </header>

  <main id="app">
    <!-- Pages render here -->
  </main>

  <!-- Persistent Spotify player — lives outside #app so navigation never destroys it -->
  <div id="spotify-bar">
    <div class="spotify-bar-label">♫ MUSIK</div>
    <iframe
      src="https://open.spotify.com/embed/playlist/37i9dQZF1EIeSXIfGg7RBn?utm_source=generator"
      width="100%" height="80" frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
